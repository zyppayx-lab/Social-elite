<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | SocialElite</title>

<meta name="description"
content="Create your SocialElite account.">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

:root{

--primary:#2563eb;
--primaryHover:#1d4ed8;

--background:#08111f;
--surface:#111c31;
--card:#14233c;

--border:#28425f;

--text:#ffffff;
--muted:#9caec9;

--success:#16a34a;
--danger:#dc2626;

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

font-family:"Inter",sans-serif;

background:var(--background);

color:var(--text);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:30px;

}

.container{

width:100%;
max-width:520px;

}

.card{

background:var(--card);

border:1px solid var(--border);

border-radius:22px;

padding:40px;

box-shadow:0 25px 60px rgba(0,0,0,.35);

animation:fade .35s ease;

}

.logo{

text-align:center;

margin-bottom:35px;

}

.logo h1{

font-size:2rem;

font-weight:800;

color:var(--primary);

}

.logo p{

margin-top:8px;

color:var(--muted);

}

h2{

text-align:center;

margin-bottom:8px;

font-size:1.8rem;

}

.subtitle{

text-align:center;

color:var(--muted);

margin-bottom:35px;

line-height:1.7;

}

.form-group{

margin-bottom:20px;

}

label{

display:block;

margin-bottom:8px;

font-size:14px;

font-weight:600;

}

input{

width:100%;

height:56px;

padding:0 16px;

border:1px solid var(--border);

border-radius:14px;

background:var(--surface);

color:#fff;

font-size:15px;

outline:none;

transition:.25s;

}

input:focus{

border-color:var(--primary);

box-shadow:0 0 0 3px rgba(37,99,235,.18);

}

.password-wrapper{

position:relative;

}

.password-toggle{

position:absolute;

right:16px;

top:50%;

transform:translateY(-50%);

background:none;

border:none;

color:var(--muted);

cursor:pointer;

font-size:13px;

font-weight:700;

}

#strength{

margin-top:8px;

font-size:13px;

font-weight:600;

color:var(--muted);

}

.checkbox{

display:flex;

align-items:flex-start;

gap:10px;

margin-top:5px;

}

.checkbox input{

width:18px;

height:18px;

margin-top:2px;

}

.checkbox label{

margin:0;

font-size:14px;

font-weight:400;

line-height:1.6;

}

.checkbox a{

color:var(--primary);

text-decoration:none;

}

button[type="submit"]{

width:100%;

height:56px;

margin-top:20px;

border:none;

border-radius:14px;

background:var(--primary);

color:#fff;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.25s;

}

button[type="submit"]:hover{

background:var(--primaryHover);

}

.message{

margin-top:20px;

padding:14px;

border-radius:12px;

display:none;

font-size:14px;

line-height:1.6;

}

.success{

background:rgba(22,163,74,.15);

border:1px solid rgba(22,163,74,.4);

color:#6ee7a3;

}

.error{

background:rgba(220,38,38,.15);

border:1px solid rgba(220,38,38,.4);

color:#fca5a5;

}

.footer{

margin-top:28px;

text-align:center;

font-size:14px;

color:var(--muted);

}

.footer a{

color:var(--primary);

text-decoration:none;

font-weight:600;

}

.loading{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(8,17,31,.94);

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:9999;

}

.spinner{

width:60px;

height:60px;

border:5px solid rgba(255,255,255,.15);

border-top:5px solid var(--primary);

border-radius:50%;

animation:spin 1s linear infinite;

margin-bottom:20px;

}

.loading p{

font-weight:600;

}

@keyframes spin{

to{

transform:rotate(360deg);

}

}

@keyframes fade{

from{

opacity:0;

transform:translateY(15px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:600px){

.card{

padding:28px 22px;

}

h2{

font-size:1.5rem;

}

}

</style>

</head>

<body>

<div class="loading" id="loading">

<div class="spinner"></div>

<p>Sending verification code...</p>

</div>

<div class="container">

<div class="card">

<div class="logo">

<h1>SocialElite</h1>

<p>Create your account</p>

</div>

<h2>Sign Up</h2>

<p class="subtitle">

Join SocialElite and start earning.

</p>

<form id="signupForm">

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="fullName"
placeholder="Enter your full name"
required>

</div>

<div class="form-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<div class="form-group">

<label>Password</label>

<div class="password-wrapper">

<input
type="password"
id="password"
placeholder="Create password"
required>

<button
type="button"
class="password-toggle"
id="togglePassword">

Show

</button>

</div>

<div id="strength">

Password Strength

</div>

</div>

<div class="form-group">

<label>Confirm Password</label>

<div class="password-wrapper">

<input
type="password"
id="confirmPassword"
placeholder="Confirm password"
required>

<button
type="button"
class="password-toggle"
id="toggleConfirm">

Show

</button>

</div>

</div>

<div class="form-group">

<label>Referral Code (Optional)</label>

<input
type="text"
id="referralCode"
placeholder="Referral code">

</div>

<div class="checkbox">

<input
type="checkbox"
id="agree">

<label for="agree">

I agree to the

<a href="/terms/">Terms</a>

and

<a href="/privacy/">Privacy Policy</a>

</label>

</div>

<button type="submit">

Create Account

</button>

<div
id="success"
class="message success">

</div>

<div
id="error"
class="message error">

</div>

</form>

<div class="footer">

Already have an account?

<a href="/login/">

Login

</a>

</div>

</div>

</div>

<script src="signup.js"></script>

</body>

  </html>
