<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Password | SocialElite</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="forgot-password.css">

</head>

<body>

<div class="background-blur blur-one"></div>

<div class="background-blur blur-two"></div>

<div class="forgot-container">

<div class="forgot-card">

<a
href="../index.html"
class="logo">

<div class="logo-icon">

S

</div>

<span>

Social<span class="blue">Elite</span>

</span>

</a>

<div class="heading">

<h1>

Forgot Password?

</h1>

<p>

Enter your registered email address and we'll send you a password reset OTP.

</p>

</div>

<div
id="successMessage"
class="success-box hidden">

</div>

<div
id="errorMessage"
class="error-box hidden">

</div>

<form
id="forgotForm">

<div class="form-group">

<label>

Email Address

</label>

<input

type="email"

id="email"

placeholder="Enter your email"

autocomplete="email"

required

>

</div>

<button

type="submit"

id="sendButton"

class="forgot-button">

<span
id="buttonText">

Send OTP

</span>

<div

id="loadingSpinner"

class="spinner hidden">

</div>

</button>

</form>

<div class="divider">

<span>

Remember your password?

</span>

</div>

<a

href="../login/login.html"

class="login-button">

Back to Login

</a>

<div class="footer">

<p>

© 2026 SocialElite

</p>

</div>

</div>

</div>

<script
type="module"
src="forgot-password.ts"></script>

</body>

  </html>
